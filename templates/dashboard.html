{% extends 'base.html' %}
{% block title %}Dashboard · Psalms & Proverbs{% endblock %}
{% block content %}
  <h2>Welcome, {{ first_name }} 👋</h2>

  <div class="grid">
    <form method="post" action="{{ url_for('suggest') }}" class="card">
      <h3>Get a Random Chapter</h3>
      <label>
        <input type="radio" name="book" value="psalms" required /> Psalms (150)
      </label>
      <label>
        <input type="radio" name="book" value="proverbs" /> Proverbs (31)
      </label>
      <button type="submit">Suggest Chapter</button>
    </form>

    <div class="card">
      <h3>Your Progress</h3>
      <a class="button" href="{{ url_for('report') }}">View Report</a>
      <a class="button secondary" href="{{ url_for('reset') }}">Reset My Progress</a>
    </div>
  </div>
{% endblock %}
